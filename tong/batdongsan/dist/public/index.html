    <script>
      (() => {
        const ignoredErrorPatterns = [
          /zaloJSV2/i,
          /Talisman extension has not been configured yet/i,
          /chrome-extension:\/\/fijngjgcjhjmmpcmkeiomlglpeiijkld/i,
        ];

        const shouldIgnore = (value) => {
          const text = String(value || "");
          return ignoredErrorPatterns.some((pattern) => pattern.test(text));
        };

        const createNoopProxy = () => {
          const noop = () => undefined;
          return new Proxy(noop, {
            get(_target, property) {
              if (property === Symbol.toPrimitive) {
                return () => "";
              }
              return createNoopProxy();
            },
            apply() {
              return undefined;
            },
          });
        };

        if (!("zaloJSV2" in window)) {
          Object.defineProperty(window, "zaloJSV2", {
            configurable: true,
            enumerable: false,
            writable: true,
            value: createNoopProxy(),
          });
        }

        window.addEventListener(
          "error",
          (event) => {
            const message = event.message || "";
            const filename = event.filename || "";
            const stack = event.error && typeof event.error === "object" ? event.error.stack || "" : "";
            if (!shouldIgnore(`${message} ${filename} ${stack}`)) return;

            event.preventDefault();
            event.stopImmediatePropagation();
          },
          true,
        );

        window.addEventListener(
          "unhandledrejection",
          (event) => {
            const reason =
              typeof event.reason === "object" && event.reason !== null
                ? `${event.reason.message || ""} ${event.reason.stack || ""}`
                : String(event.reason || "");

            if (!shouldIgnore(reason)) return;

            event.preventDefault();
            event.stopImmediatePropagation();
          },
          true,
        );
      })();
